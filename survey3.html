<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> 설문지 </title>
    </head>
    <body>
        <header>
            <h3>설문지</h3>
            소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        </header>
        <hr>
    <section>
        <article>
            학년 <label><input type="radio" name="grade" value="1">1학년</label>
            <label><input type="radio" name="grade" value="2">2학년</label>
            <label><input type="radio" name="grade" value="3">3학년</label><br>
        </article>
        <br><br>
        <article>
            성별 <label><input type="radio" name="gender" value="m">남자</label>
            <label><input type="radio" name="gender" value="f">여자</label><br>
        </article>
        <br><br>
        <article>
            관심분야 
            <select>
                <option>모바일 소프트웨어</option>
                <option>웹 개발</option>
                <option>게임 개발</option>
            </select>
        </article>
        <br><br>
        <article>
            진로 <label><input type="checkbox" name="개발" value="developer">개발</label>
            <label><input type="checkbox" name="기획" value="planner">기획</label>
            <label><input type="checkbox" name="영업" value="designer">영업</label>
            <label><input type="checkbox" name="창업" value="sales">창업</label>
        </article>
        <br><br>
        <article>
            남기고 싶은 말 <textarea rows="5" cols="30"></textarea>
        </article>
    </section>
    <br><br>
    <footer>
        copyright 2026 by MYONGJI COLLEGE
    </footer>
    </body>
</html>
